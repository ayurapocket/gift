<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレゼントリンク作成</title>
<style>
  :root {
    --red: #E8324A;
    --red-dark: #C41F35;
    --pink-light: #FFF0F2;
    --pink-mid: #FDDDE2;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0e0e0;
    --radius: 14px;
    --radius-sm: 8px;
    --font: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: #fdf6f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
    color: var(--text);
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  .logo-bow { display: inline-block; font-size: 3rem; margin-bottom: 0.5rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; color: var(--red-dark); }
  header p { font-size: 0.88rem; color: var(--text-muted); margin-top: 4px; }
  .card { background: #fff; border-radius: var(--radius); border: 1px solid var(--pink-mid); padding: 2rem; width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(232,50,74,0.06); }
  .step { display: flex; align-items: baseline; gap: 10px; margin-bottom: 0.8rem; }
  .step-num { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: var(--red); background: var(--pink-light); border: 1px solid var(--pink-mid); border-radius: 999px; padding: 2px 10px; white-space: nowrap; }
  .step-label { font-size: 0.95rem; font-weight: 600; color: var(--text); }
  .field-block { margin-bottom: 1.8rem; }
  .url-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; font-family: var(--font); color: var(--text); background: #fff; transition: border-color 0.2s; outline: none; }
  .url-input:focus { border-color: var(--red); }
  .url-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 6px; }
  .msg-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.9rem; font-family: var(--font); color: var(--text); background: #fff; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
  .msg-textarea:focus { border-color: var(--red); }
  #create-btn { width: 100%; padding: 15px; background: var(--red); color: #fff; border: none; border-radius: 999px; font-size: 1rem; font-weight: 700; font-family: var(--font); cursor: pointer; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; letter-spacing: 0.04em; margin-top: 0.5rem; box-shadow: 0 4px 16px rgba(232,50,74,0.22); }
  #create-btn:hover { background: var(--red-dark); box-shadow: 0 6px 20px rgba(232,50,74,0.32); }
  #create-btn:active { transform: scale(0.98); }
  #error-msg { font-size: 0.82rem; color: var(--red); margin-top: 8px; min-height: 18px; text-align: center; font-weight: bold; }
  #result-area { display: none; margin-top: 2rem; background: var(--pink-light); border: 1.5px solid var(--pink-mid); border-radius: var(--radius); padding: 1.5rem; text-align: center; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  #result-area h2 { font-size: 1rem; font-weight: 700; color: var(--red-dark); margin-bottom: 0.8rem; }
  #result-url { width: 100%; padding: 10px 12px; border: 1.5px solid var(--pink-mid); border-radius: var(--radius-sm); font-size: 0.8rem; font-family: monospace; background: #fff; color: var(--text); word-break: break-all; resize: none; outline: none; min-height: 60px; }
  #copy-btn { margin-top: 10px; padding: 10px 28px; background: var(--red); color: #fff; border: none; border-radius: 999px; font-size: 0.9rem; font-weight: 600; font-family: var(--font); cursor: pointer; transition: background 0.2s; }
  #copy-btn:hover { background: var(--red-dark); }
  #copy-msg { font-size: 0.8rem; color: #2a9d5c; margin-top: 6px; min-height: 18px; }
  #preview-link { display: inline-block; margin-top: 10px; font-size: 0.82rem; color: var(--red); text-decoration: none; }
  #preview-link:hover { text-decoration: underline; }
  footer { margin-top: 2rem; font-size: 0.76rem; color: #bbb; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="logo-bow">🎀</div>
  <h1>プレゼントを作る</h1>
  <p>ダウンロードURLを設定して、相手に送る専用リンクを生成します</p>
</header>

<div class="card">
  <div class="field-block">
    <div class="step">
      <span class="step-num">STEP 1</span>
      <span class="step-label">ダウンロードURLを貼り付ける</span>
    </div>
    <input class="url-input" type="url" id="dl-url" placeholder="https://xgf.nu/xxxxx など">
    <p class="url-hint">ギガファイル便・Dropbox・Google Drive などのリンク</p>
  </div>

  <div class="field-block">
    <div class="step">
      <span class="step-num">STEP 2</span>
      <span class="step-label">メッセージを添える（任意）</span>
    </div>
    <textarea class="msg-textarea" id="msg-text" placeholder="心を込めて描きました！&#13;&#10;（改行もそのまま表示されます）"></textarea>
  </div>

  <button id="create-btn" onclick="createGift()">🎁 プレゼントリンクを生成する</button>
  <p id="error-msg"></p>

  <div id="result-area">
    <h2>✨ リンクが生成されました！</h2>
    <textarea id="result-url" readonly></textarea>
    <br>
    <button id="copy-btn" onclick="copyUrl()">コピーする</button>
    <p id="copy-msg"></p>
    <a id="preview-link" href="#" target="_blank">👁 プレビューを確認する</a>
  </div>
</div>

<footer>生成されたリンクを相手に送るだけでOK。サーバー不要・データは送信されません。</footer>

<script>
function createGift() {
  const url = document.getElementById('dl-url').value.trim();
  const msg = document.getElementById('msg-text').value.trim();
  const err = document.getElementById('error-msg');

  if (!url) { err.textContent = 'ダウンロードURLを入力してください。'; return; }
  if (!url.startsWith('http')) { err.textContent = '正しいURLを入力してください（http〜）。'; return; }
  err.textContent = '';

  const base = new URL('gift-open.html', location.href).href;
  const params = new URLSearchParams();
  
  params.set('dl', url);
  if (msg) params.set('msg', msg);

  const giftUrl = base + '?' + params.toString();

  document.getElementById('result-url').value = giftUrl;
  document.getElementById('preview-link').href = giftUrl;
  document.getElementById('result-area').style.display = 'block';
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyUrl() {
  const ta = document.getElementById('result-url');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    document.getElementById('copy-msg').textContent = 'コピーしました！';
    setTimeout(() => document.getElementById('copy-msg').textContent = '', 2500);
  }).catch(() => {
    document.execCommand('copy');
    document.getElementById('copy-msg').textContent = 'コピーしました！';
  });
}
</script>
</body>
</html>
