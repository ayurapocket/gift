<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレゼントが届きました！</title>
<style>
  :root {
    --red: #E8324A;
    --red-dark: #C41F35;
    --pink-light: #FFF0F2;
    --pink-mid: #FDDDE2;
    --text: #1a1a1a;
    --radius: 20px;
    --font: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: #fdf6f7;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    color: var(--text);
    overflow-x: hidden;
  }
  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 440px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(232,50,74,0.08);
    border: 1px solid var(--pink-mid);
    position: relative;
  }

  /* プレゼント箱のスタイルとアニメーション */
  .gift-box-container {
    margin: 1.5rem 0 2rem;
    cursor: pointer;
    display: inline-block;
    position: relative;
    perspective: 1000px;
  }
  .box-emoji {
    font-size: 6rem;
    display: inline-block;
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: bounce 2.5s ease infinite;
  }
  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0) scale(1); }
    40% { transform: translateY(-15px) scale(1.05); }
    60% { transform: translateY(-7px) scale(1.02); }
  }
  .gift-box-container:hover .box-emoji {
    transform: scale(1.1);
  }
  .click-hint {
    font-size: 0.88rem;
    color: var(--red);
    font-weight: bold;
    margin-top: 5px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* 開封タイトル */
  h1 { font-size: 1.4rem; font-weight: 700; color: var(--red-dark); margin-bottom: 0.5rem; }
  .sub-title { font-size: 0.9rem; color: #666; margin-bottom: 1rem; }

  /* 中身（最初は非表示） */
  .gift-content {
    display: none;
    opacity: 0;
    transform: scale(0.8) translateY(20px);
    transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
  }
  .gift-content.show {
    display: block;
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* イラスト表示エリア */
  .img-container {
    background: #fafafa;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid var(--pink-mid);
    margin-bottom: 1.5rem;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
  }
  #gift-img {
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    border-radius: 6px;
    display: block;
  }

  /* メッセージエリア */
  #msg-area {
    background: var(--pink-light);
    border-left: 4px solid var(--red);
    padding: 14px 16px;
    border-radius: 4px 12px 12px 4px;
    font-size: 0.95rem;
    line-height: 1.6;
    text-align: left;
    margin-bottom: 2rem;
    color: #333;
    white-space: pre-wrap;
  }

  /* ダウンロードボタン */
  #dl-btn {
    display: inline-block;
    width: 100%;
    padding: 16px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    box-shadow: 0 6px 20px rgba(232,50,74,0.25);
  }
  #dl-btn:hover {
    background: var(--red-dark);
    box-shadow: 0 8px 24px rgba(232,50,74,0.35);
    transform: translateY(-2px);
  }
  #dl-btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="card">
  <div id="closed-view">
    <h1>プレゼントが届きました！</h1>
    <p class="sub-title">あゆらさんからの贈り物です🎁</p>
    
    <div class="gift-box-container" onclick="openGift()">
      <span class="box-emoji" id="box-icon">🎁</span>
      <p class="click-hint">👇 ここをタップして開ける！</p>
    </div>
  </div>

  <div id="opened-view" class="gift-content">
    <h1>おめでとうございます！</h1>
    <p class="sub-title" style="margin-bottom: 1.5rem;">プレゼントが開きました✨</p>
    
    <div class="img-container">
      <img id="gift-img" src="" alt="プレゼントイラスト">
    </div>
    
    <div id="msg-area"></div>
    
    <a id="dl-btn" href="#" target="_blank">✨ 受け取る (ダウンロード)</a>
  </div>
</div>

<script>
  // URLからデータを取り出す
  const params = new URLSearchParams(window.location.search);
  const imgData = params.get('img');
  const dlUrl = params.get('dl');
  const msgData = params.get('msg');

  // 画面にデータを仕込んでおく
  if (imgData) document.getElementById('gift-img').src = imgData;
  if (dlUrl) document.getElementById('dl-btn').href = dlUrl;
  
  if (msgData) {
    document.getElementById('msg-area').textContent = msgData;
  } else {
    document.getElementById('msg-area').style.display = 'none';
  }

  // 箱を開ける関数
  function openGift() {
    const boxIcon = document.getElementById('box-icon');
    const closedView = document.getElementById('closed-view');
    const openedView = document.getElementById('opened-view');

    // 1. 箱が弾けるアニメーション
    boxIcon.style.animation = 'none';
    boxIcon.style.transform = 'scale(1.4) rotate(15deg)';
    boxIcon.textContent = '🎉';

    // 2. 少し余韻を残して、パカッと中身をフェードイン
    setTimeout(() => {
      closedView.style.display = 'none';
      openedView.classList.add('show');
    }, 400);
  }
</script>
</body>
</html>
