<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>届いたプレゼントを開ける</title>
<style>
  :root {
    --red: #E8324A;
    --red-dark: #C41F35;
    --pink-light: #FFF0F2;
    --pink-mid: #FDDDE2;
    --text: #1a1a1a;
    --text-muted: #666;
    --radius: 16px;
    --font: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: #fdf6f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: var(--text);
    overflow-x: hidden;
    position: relative;
  }
  .wrapper { width: 100%; max-width: 420px; text-align: center; z-index: 10; }
  
  /* メッセージボックス */
  #msg-box {
    background: #fff;
    border: 1px solid var(--pink-mid);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 4px 20px rgba(232,50,74,0.04);
    display: none;
    text-align: left;
    animation: fadeIn 0.6s ease both;
  }
  #msg-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* プレゼント箱の演出 */
  .gift-container { position: relative; height: 200px; margin: 2rem 0; display: flex; align-items: center; justify-content: center; }
  .box-emoji { font-size: 7rem; cursor: pointer; transition: transform 0.3s; user-select: none; position: relative; }
  .box-emoji:hover { transform: scale(1.05); }
  
  /* 箱が開くときのジャンプアニメーション */
  .box-emoji.open-anim { animation: openJump 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
  @keyframes openJump {
    0% { transform: scale(1); }
    30% { transform: scale(1.2, 0.85); }
    60% { transform: scale(0.95, 1.15) translateY(-20px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* キラキラ星のエフェクト（JavaScriptで生成） */
  .star-particle {
    position: absolute;
    pointer-events: none;
    font-size: 1.5rem;
    z-index: 999;
    animation: starFloat 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  }
  @keyframes starFloat {
    0% { opacity: 1; transform: translate(0, 0) scale(0.5) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--mx), var(--my)) scale(1.3) rotate(var(--mr)); }
  }

  /* ボタン */
  .action-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,50,74,0.25);
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }
  .action-btn:hover { background: var(--red-dark); box-shadow: 0 6px 20px rgba(232,50,74,0.35); }
  .action-btn:active { transform: scale(0.98); }

  /* ダウンロードエリア */
  #download-area { display: none; margin-top: 1.5rem; animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
  @keyframes popUp {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .download-title { font-size: 1.1rem; font-weight: 700; color: var(--red-dark); margin-bottom: 1rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="wrapper">
  <div id="msg-box"><p id="msg-text"></p></div>

  <div class="gift-container">
    <div id="gift-box" class="box-emoji" onclick="openGift()">🎁</div>
  </div>

  <div id="action-area">
    <button id="main-btn" class="action-btn" onclick="openGift()">🎁 プレゼントを受け取る</button>
  </div>

  <div id="download-area">
    <p class="download-title">✨ 中身が入っています！ ✨</p>
    <a id="dl-link" class="action-btn" href="#" target="_blank" rel="noopener noreferrer">📂 ファイルをダウンロードする</a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dlUrl = params.get('dl');
const msgContent = params.get('msg');

if (msgContent) {
  document.getElementById('msg-text').textContent = msgContent;
  document.getElementById('msg-box').style.display = 'block';
}

function createStar(x, y) {
  const stars = ['✨', '⭐', '🌟', '💫'];
  const star = document.createElement('div');
  star.className = 'star-particle';
  star.textContent = stars[Math.floor(Math.random() * stars.length)];
  
  // ランダムな飛び散る方向を計算
  const angle = Math.random() * Math.PI * 2;
  const velocity = 50 + Math.random() * 120;
  const mx = Math.cos(angle) * velocity;
  const my = Math.sin(angle) * velocity - 60; // 少し上方向にバイアス
  const mr = Math.random() * 360;
  
  star.style.setProperty('--mx', `${mx}px`);
  star.style.setProperty('--my', `${my}px`);
  star.style.setProperty('--mr', `${mr}deg`);
  
  star.style.left = `${x}px`;
  star.style.top = `${y}px`;
  
  document.body.appendChild(star);
  
  // アニメーション終了後に消去
  setTimeout(() => star.remove(), 1200);
}

function openGift() {
  const box = document.getElementById('gift-box');
  if (box.classList.contains('open-anim')) return;

  // はじけるジャンプアニメーションを開始
  box.classList.add('open-anim');
  
  // 箱の真ん中の位置を取得して星を飛び散らせる
  const rect = box.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;
  
  // 豪華に30個のキラキラ星を生成！
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      createStar(centerX, centerY);
    }, Math.random() * 200); // わずかにタイミングをずらして綺麗に見せる
  }

  // 0.25秒後に「パカッと上が開いた魔法の箱」に変身！
  setTimeout(() => {
    box.textContent = '🏺'; 
    // ※絵文字の特性上、中からキラキラが溢れているように見える魔法のオープン箱表現です！
  }, 250);

  // ボタンを切り替えてダウンロードエリアを表示
  setTimeout(() => {
    document.getElementById('action-area').style.display = 'none';
    if (dlUrl) {
      document.getElementById('dl-link').href = dlUrl;
    }
    document.getElementById('download-area').style.display = 'block';
  }, 450);
}
</script>
</body>
</html>
