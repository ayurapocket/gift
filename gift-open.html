<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>届いたプレゼントを開ける</title>
<style>
  :root {
    --red: #E8324A;
    --red-dark: #C41F35;
    --pink-light: #FFF0F2;
    --pink-mid: #FDDDE2;
    --text: #1a1a1a;
    --text-muted: #666;
    --radius: 16px;
    --font: 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: #fdf6f7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    color: var(--text);
  }
  .wrapper { width: 100%; max-width: 420px; text-align: center; }
  
  /* メッセージボックス */
  #msg-box {
    background: #fff;
    border: 1px solid var(--pink-mid);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 2rem;
    box-shadow: 0 4px 20px rgba(232,50,74,0.04);
    display: none;
    text-align: left;
    animation: fadeIn 0.6s ease both;
  }
  #msg-text {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap; /* 改行や空白をそのまま綺麗に見せる魔法 */
  }

  /* プレゼント箱の演出 */
  .gift-container { position: relative; height: 200px; margin: 2rem 0; display: flex; align-items: center; justify-content: center; }
  .box-emoji { font-size: 7rem; cursor: pointer; transition: transform 0.3s; user-select: none; }
  .box-emoji:hover { transform: scale(1.05); }
  .box-emoji.open { animation: openLid 0.5s forwards; }
  @keyframes openLid {
    0% { transform: scale(1); }
    50% { transform: scale(1.1) rotate(-5deg); }
    100% { transform: scale(1); }
  }

  /* ボタン */
  .action-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,50,74,0.25);
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }
  .action-btn:hover { background: var(--red-dark); box-shadow: 0 6px 20px rgba(232,50,74,0.35); }
  .action-btn:active { transform: scale(0.98); }

  /* ダウンロードエリア */
  #download-area { display: none; margin-top: 1.5rem; animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both; }
  @keyframes popUp {
    0% { opacity: 0; transform: scale(0.8) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .download-title { font-size: 1.1rem; font-weight: 700; color: var(--red-dark); margin-bottom: 1rem; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="wrapper">
  <div id="msg-box"><p id="msg-text"></p></div>

  <div class="gift-container">
    <div id="gift-box" class="box-emoji" onclick="openGift()">🎁</div>
  </div>

  <div id="action-area">
    <button id="main-btn" class="action-btn" onclick="openGift()">🎁 プレゼントを受け取る</button>
  </div>

  <div id="download-area">
    <p class="download-title">✨ 中身が入っています！ ✨</p>
    <a id="dl-link" class="action-btn" href="#" target="_blank" rel="noopener noreferrer">📂 ファイルをダウンロードする</a>
  </div>
</div>

<script>
// URLからパラメータ（dlとmsg）を取得
const params = new URLSearchParams(window.location.search);
const dlUrl = params.get('dl');
const msgContent = params.get('msg');

// メッセージがあれば表示
if (msgContent) {
  document.getElementById('msg-text').textContent = msgContent;
  document.getElementById('msg-box').style.display = 'block';
}

function openGift() {
  const box = document.getElementById('gift-box');
  if (box.classList.contains('open')) return;

  // 箱を開けるアニメーション
  box.classList.add('open');
  
  // 0.3秒後に絵文字を「開いた箱」に変える
  setTimeout(() => {
    box.textContent = '📦';
  }, 250);

  // ボタンを消して、ダウンロードボタンをパッと出す
  setTimeout(() => {
    document.getElementById('action-area').style.display = 'none';
    if (dlUrl) {
      document.getElementById('dl-link').href = dlUrl;
    }
    document.getElementById('download-area').style.display = 'block';
  }, 400);
}
</script>
</body>
</html>
